<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annu's Cosmic Greeting</title>
    <style>
        /* General Page Styling */
        body {
            margin: 0;
            padding: 0;
            background-color: #05051a; 
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 3D Text Animation */
        .text-container {
            perspective: 1000px;
            margin-bottom: 30px;
            text-align: center;
        }

        .animated-text {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            transform-style: preserve-3d;
            animation: rotateText 6s infinite ease-in-out, colorBlink 1s infinite alternate;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
        }

        @keyframes rotateText {
            0% { transform: rotateX(10deg) rotateY(-15deg); }
            50% { transform: rotateX(-10deg) rotateY(15deg); }
            100% { transform: rotateX(10deg) rotateY(-15deg); }
        }

        @keyframes colorBlink {
            0% { color: #00f2fe; text-shadow: 0 0 15px #00f2fe; }
            50% { color: #ff00de; text-shadow: 0 0 30px #ff00de; }
            100% { color: #f9ff00; text-shadow: 0 0 15px #f9ff00; }
        }

        /* Button Container */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* The Buttons */
        .image-button, .care-button {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 25px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            text-decoration: none;
            color: white;
        }

        .image-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 40px rgba(255, 0, 222, 0.5);
        }

        /* TAKE CARE Button Specific Styling */
        .care-button {
            perspective: 500px;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            animation: float 3s infinite ease-in-out;
        }

        .care-button:hover {
            transform: scale(1.1) rotateY(20deg);
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 30px #00ff88;
        }

        .care-text {
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 1.2rem;
            animation: careBlink 0.8s infinite alternate;
            user-select: none;
        }

        @keyframes careBlink {
            from { opacity: 1; color: #fff; text-shadow: 0 0 5px #00ff88; }
            to { opacity: 0.7; color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .button-dp {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid #f9ff00;
            object-position: center top; 
        }

        .btn-label {
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Roast Overlay */
        .roast-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
        }

        .roast-content {
            max-width: 550px;
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .full-pic-frame {
            position: relative;
            margin-bottom: 25px;
            display: inline-block;
        }

        .roast-image-full {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .roast-text {
            font-size: 1.3rem;
            line-height: 1.5;
            color: #fff;
            text-shadow: 1px 1px 5px #000;
        }

        .highlight-quote {
            color: #f9ff00;
            font-weight: 800;
            display: block;
            margin-top: 20px;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            border-left: 5px solid #ff3b3b;
        }

        .close-btn {
            margin-top: 25px;
            padding: 12px 40px;
            background: linear-gradient(90deg, #ff3b3b, #ff00de);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <audio id="roastMusic" src="Peela_Sweater.mp3" ></audio>

    <div class="text-container">
        <div class="animated-text">Good NIGHT ANNU</div>
    </div>

    <div class="button-group">
        <button class="image-button" onclick="openRoast()">
            <img src="moon.jpeg" class="button-dp" alt="Annu DP">
            <span class="btn-label">Check the Moon-Catcher! 🌚</span>
        </button>

        <button class="care-button">
            <span class="care-text">✨ TAKE CARE ✨</span>
        </button>
    </div>

    <div class="roast-overlay" id="roastBox">
        <div class="roast-content">
            <div class="full-pic-frame">
                <img src="moon.jpeg" class="roast-image-full" alt="Annu Full Pic">
            </div>
            
            <div class="roast-text">
                <p>Annu ne jab selfie li moon ke saath,<br>
                Raat ne de diya resignation haath! 🌚😂</p>
                
                <p>Ab suraj bhi tension mein aa gaya,<br>
                “Kal mujhe bhi pakad liya toh?” ghabra gaya ☀️</p>
                
                <span class="highlight-quote">"BHAI TUNI MOON PAKKAD LIYA DUNIYA ANDERA MHAI"</span>
            </div>

            <button class="close-btn" onclick="closeRoast()">MAAF KARDO BHAI! 😂</button>
        </div>
    </div>

    <script>
        const music = document.getElementById('roastMusic');

        function openRoast() {
            document.getElementById('roastBox').style.display = 'flex';
            music.play().catch(error => console.log("Music play blocked by browser. Click the button again."));
        }

        function closeRoast() {
            document.getElementById('roastBox').style.display = 'none';
        }
    </script>

</body>
</html>
